name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: yamllint -d relaxed action.yml .github/workflows/ tests/

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          cache: true

  test-action:
    name: Test Action (defaults)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run action with default inputs against fixture
        id: kbt
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator

      - name: Verify outputs
        run: |
          EXIT='${{ steps.kbt.outputs.test_exit_code }}'
          DRIFT='${{ steps.kbt.outputs.manifests_drift }}'
          echo "test_exit_code=${EXIT}"
          echo "manifests_drift=${DRIFT}"
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected test_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          if [[ "${DRIFT}" != "false" ]]; then
            echo "::error::expected manifests_drift='false', got '${DRIFT}'"
            exit 1
          fi
          echo "[PASS] defaults"

  test-action-custom:
    name: Test Action (custom test_command, verify disabled)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run action with custom test_command and verify_manifests=false
        id: kbt
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator
          test_command: 'go test ./pkg/...'
          verify_manifests: 'false'

      - name: Verify outputs
        run: |
          EXIT='${{ steps.kbt.outputs.test_exit_code }}'
          DRIFT='${{ steps.kbt.outputs.manifests_drift }}'
          echo "test_exit_code=${EXIT}"
          echo "manifests_drift=${DRIFT}"
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected test_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          if [[ "${DRIFT}" != "false" ]]; then
            echo "::error::expected manifests_drift='false' (verify skipped), got '${DRIFT}'"
            exit 1
          fi
          echo "[PASS] custom test_command + verify_manifests=false"

  test-action-drift:
    name: Test Action (drift detection)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run action with a verify_command that intentionally modifies api/
        id: kbt
        uses: ./
        continue-on-error: true
        with:
          working_directory: tests/fixtures/sample_operator
          verify_command: 'echo "// drift introduced by CI" >> api/v1/doc.go'
          verify_paths: 'api/'

      - name: Assert drift detection fired
        run: |
          OUTCOME='${{ steps.kbt.outcome }}'
          DRIFT='${{ steps.kbt.outputs.manifests_drift }}'
          echo "outcome=${OUTCOME}"
          echo "manifests_drift=${DRIFT}"
          if [[ "${OUTCOME}" != "failure" ]]; then
            echo "::error::expected action to fail when drift is introduced, got outcome='${OUTCOME}'"
            exit 1
          fi
          if [[ "${DRIFT}" != "true" ]]; then
            echo "::error::expected manifests_drift='true', got '${DRIFT}'"
            exit 1
          fi
          echo "[PASS] drift detection correctly fired"

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, test-action, test-action-custom, test-action-drift]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::lint failed"
            exit 1
          fi
          if [[ "${{ needs.test-action.result }}" != "success" ]]; then
            echo "::error::test-action failed"
            exit 1
          fi
          if [[ "${{ needs.test-action-custom.result }}" != "success" ]]; then
            echo "::error::test-action-custom failed"
            exit 1
          fi
          if [[ "${{ needs.test-action-drift.result }}" != "success" ]]; then
            echo "::error::test-action-drift failed"
            exit 1
          fi
          echo "All CI jobs passed"
